draw = <alt> <super> BTN_LEFT
from_center = true
line_width = 3.000000
method = draw
stroke_color = \#FF0000FF

[autostart]
autostart0 = dex -a
autostart1 = /usr/lib/xdg-desktop-portal-wlr
